<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700&family=Source+Sans+3:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/reset.css">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/page.css">
<link rel="stylesheet" href="/styles/layout.css">
<script type="importmap">
{
	"imports": {
		"@unbndl/auth": "https://unpkg.com/@unbndl/auth",
		"@unbndl/html": "https://unpkg.com/@unbndl/html",
		"@unbndl/view": "https://unpkg.com/@unbndl/view"
	}
}
</script>
<script type="module">
	import { define } from "@unbndl/html";
	import { Auth } from "@unbndl/auth";
	import { HeaderElement } from "/js/header.js";
	import { RestaurantElement } from "/js/restaurant.js";

	define({
		"auth-provider": Auth.Provider,
		"ff-header": HeaderElement,
		"ff-restaurant": RestaurantElement
	});
</script>
</head>
<body class="page-restaurant">
<auth-provider>
	<ff-header current="taco-bell" subtitle="Restaurant Details"></ff-header>
	<main class="page-grid">
		<section class="card span-4">
			<ff-restaurant icon="icon-taco" location="San Francisco, California" cuisine="Tex-Mex" back-href="../index.html">
				Taco Bell
			</ff-restaurant>
		</section>
		<section class="card span-4">
			<h2>
				<svg class="icon" aria-hidden="true">
					<use href="/icons/restaurant.svg#icon-menu" />
				</svg>
				Menu
			</h2>
			<ul class="stack-list">
				<li>Crunchwrap Supreme</li>
				<li>Chicken Quesadilla</li>
			</ul>
		</section>
		<section class="card span-4">
			<h2>Customers and Reviews</h2>
			<ul class="stack-list">
				<li>Carol: Great late-night option and good value.</li>
			</ul>
		</section>
	</main>
</auth-provider>
</body>
</html>
