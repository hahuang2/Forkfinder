<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;700&family=Source+Sans+3:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/reset.css">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/page.css">
<link rel="stylesheet" href="/styles/layout.css">
<script type="importmap">
{
	"imports": {
		"@unbndl/auth": "https://unpkg.com/@unbndl/auth",
		"@unbndl/html": "https://unpkg.com/@unbndl/html",
		"@unbndl/view": "https://unpkg.com/@unbndl/view"
	}
}
</script>
<script type="module">
	import { define } from "@unbndl/html";
	import { Auth } from "@unbndl/auth";
	import { HeaderElement } from "/js/header.js";
	import { RestaurantElement } from "/js/restaurant.js";
	import { RestaurantsListElement } from "/js/restaurants-list.js";

	define({
		"auth-provider": Auth.Provider,
		"ff-header": HeaderElement,
		"ff-restaurant": RestaurantElement,
		"ff-restaurants": RestaurantsListElement
	});
</script>
</head>
<body class="page-home">
<auth-provider>
	<ff-header current="home" subtitle="Homepage"></ff-header>
	<main class="page-grid">
		<section class="card span-12">
			<h2>Restaurant Directory</h2>
			<p><strong>Pick a restaurant:</strong></p>
			<ff-restaurants src="/api/restaurants"></ff-restaurants>
		</section>
	</main>
</auth-provider>
</body>
</html>
